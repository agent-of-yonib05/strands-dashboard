<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agent Activity - Open PRs & Issues</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agent Activity">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="Agent Activity - Open PRs and Issues in public repos">
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg width='290' height='463' viewBox='0 0 290 463' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M97.29 52.79C85.07 49.17 72.22 56.14 68.6 68.36C64.98 80.58 71.95 93.43 84.17 97.05L235.12 139.78C245.22 142.77 246.36 156.63 236.87 161.23L32.55 260.29C-14.94 283.32-9.16 352.74 41.48 367.59L189.55 411.01 190.13 411.17C202.18 414.38 214.67 407.4 218.2 395.36C221.78 383.12 214.77 370.3 202.54 366.71L54.47 323.29C44.34 320.32 43.19 306.44 52.69 301.83L257.01 202.77C304.43 179.78 298.76 110.48 248.23 95.51L97.29 52.79Z' fill='%23555'/%3E%3Cpath d='M259.15.98C271.39-2.57 284.2 4.47 287.75 16.71C291.31 28.95 284.27 41.76 272.03 45.31L71.17 103.67C40.71 112.52 37.2 154.26 65.75 168.08L241.34 253.09C307.87 285.3 299.79 382.55 228.86 403.34L30.4 461.5C18.17 465.09 5.35 458.08 1.76 445.84C-1.82 433.61 5.19 420.79 17.42 417.2L215.88 359.04C246.28 350.13 249.74 308.45 221.23 294.65L45.63 209.64C-20.98 177.39-12.78 79.99 58.29 59.34L259.15.98Z' fill='%2300FF77'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #58a6ff;
            --accent-light: #79c0ff;
            --accent-dim: rgba(56, 139, 253, 0.15);
            --gradient-1: #58a6ff;
            --gradient-2: #58a6ff;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2128;
            --bg-glass: #161b22;
            --border: #30363d;
            --border-hover: #484f58;
            --border-accent: rgba(56, 139, 253, 0.3);
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 22px;
            --shadow-md: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: none;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            min-height: 100dvh;
        }

        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px;
            padding-top: max(28px, env(safe-area-inset-top));
            padding-left: max(28px, env(safe-area-inset-left));
            padding-right: max(28px, env(safe-area-inset-right));
            padding-bottom: max(28px, env(safe-area-inset-bottom));
            position: relative;
            z-index: 1;
        }

        .header { margin-bottom: 32px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .header h1 { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .back-link {
            padding: 10px 18px; border-radius: var(--radius-sm);
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 13px; font-weight: 600;
            text-decoration: none; transition: all 0.25s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.04); color: var(--text); }

        .refresh-btn {
            padding: 10px 18px; border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

        .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 32px; }
        .overview-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 22px 16px; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        }
        .overview-card:hover { border-color: var(--border-accent); transform: translateY(-3px); box-shadow: var(--shadow-md), var(--shadow-glow); }
        .overview-value {
            font-size: 38px; font-weight: 800; margin-bottom: 6px;
            letter-spacing: -0.04em;
            color: var(--text);
        }
        .overview-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }

        .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-tab {
            padding: 8px 18px; border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.025); border: 1px solid transparent;
            color: var(--text-muted); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
        }
        .filter-tab:hover { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
        .filter-tab.active {
            background: linear-gradient(135deg, rgba(124, 92, 252, 0.12), rgba(6, 182, 212, 0.08));
            border-color: rgba(124, 92, 252, 0.2); color: var(--accent-light);
        }

        .section { margin-bottom: 28px; }
        .section-header {
            font-size: 15px; font-weight: 700; margin-bottom: 14px;
            color: var(--text-secondary); display: flex; align-items: center; gap: 10px;
        }
        .section-count { padding: 3px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 12px; font-weight: 800; color: var(--text-muted); }

        .item-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px 20px; margin-bottom: 10px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; text-decoration: none; display: block; color: inherit;
            position: relative; overflow: hidden;
        }
        .item-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(124, 92, 252, 0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        .item-card:hover { background: var(--bg-card-hover); border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .item-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
        .item-icon {
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .item-icon.pr { background: var(--accent-dim); }
        .item-icon.issue { background: rgba(255,255,255,0.04); }
        .item-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 3px; }
        .item-repo { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .item-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .badge {
            display: inline-flex; align-items: center; padding: 5px 10px;
            border-radius: 8px; font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .badge.open { background: var(--accent-dim); color: var(--accent-light); }
        .badge.draft { background: rgba(255,255,255,0.03); color: var(--text-muted); border: 1px dashed rgba(255,255,255,0.1); }
        .meta-text { font-size: 12px; color: var(--text-muted); }
        .label-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.06); color: var(--text-secondary); }

        .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
        .spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.06); border-top-color: var(--accent-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.25; }
        .empty-state h3 { font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 700; }

        .settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .form-input { width: 100%; background: rgba(255,255,255,0.035); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-size: 14px; font-family: inherit; transition: all 0.25s ease; }
        .form-input:focus { outline: none; border-color: var(--accent); background: rgba(124, 92, 252, 0.05); box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.1), var(--shadow-glow); }
        .form-input::placeholder { color: var(--text-muted); }

        .save-btn {
            padding: 14px 24px; border-radius: var(--radius); border: none;
            background: linear-gradient(135deg, var(--gradient-1), #6366f1);
            color: #fff; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.25s ease;
        }
        .save-btn:hover { box-shadow: 0 8px 32px rgba(124, 92, 252, 0.35); transform: translateY(-2px); filter: brightness(1.1); }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 14px 20px; background: var(--bg-glass); 
            border: 1px solid var(--border-accent); border-radius: var(--radius);
            font-size: 13px; font-weight: 700; color: var(--accent-light);
            transform: translateY(100px); opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1000;
            box-shadow: 0 16px 64px rgba(0,0,0,0.4), var(--shadow-glow);
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .last-updated { font-size: 11px; color: var(--text-muted); margin-top: 24px; text-align: center; }

        @media (max-width: 768px) {
            .container { padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(16px, env(safe-area-inset-bottom)); }
            .header h1 { font-size: 22px; }
            .back-link, .refresh-btn { padding: 10px 14px; min-height: 40px; display: flex; align-items: center; }
            .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .overview-card { padding: 16px 12px; border-radius: var(--radius); }
            .overview-value { font-size: 28px; }
            .filter-tab { padding: 10px 16px; min-height: 40px; display: flex; align-items: center; }
            .item-card { padding: 14px 16px; margin-bottom: 8px; border-radius: var(--radius-sm); }
            .form-input { padding: 14px 16px; font-size: 16px; min-height: 48px; border-radius: 12px; }
            .save-btn { width: 100%; padding: 14px 24px; min-height: 48px; font-size: 16px; }
            .toast { left: 16px; right: 16px; text-align: center; }
        }

        @media (max-width: 380px) {
            .overview-value { font-size: 24px; }
            .header h1 { font-size: 20px; }
            .item-title { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>Agent Activity</h1>
                <div class="header-actions">
                    <a href="index.html" class="back-link">← Dashboard</a>
                    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
                </div>
            </div>
        </div>

        <div class="overview-grid" id="overviewGrid">
            <div class="overview-card"><div class="overview-value" id="totalPRs">-</div><div class="overview-label">Open PRs</div></div>
            <div class="overview-card"><div class="overview-value" id="totalIssues">-</div><div class="overview-label">Open Issues</div></div>
            <div class="overview-card"><div class="overview-value" id="totalRepos">-</div><div class="overview-label">Repos</div></div>
            <div class="overview-card"><div class="overview-value" id="totalItems">-</div><div class="overview-label">Total</div></div>
        </div>

        <div class="filters" id="filterTabs">
            <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-tab" data-filter="prs" onclick="setFilter('prs')">PRs</button>
            <button class="filter-tab" data-filter="issues" onclick="setFilter('issues')">Issues</button>
        </div>

        <div id="content">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        <div id="settingsPanel" style="display:none;">
            <div class="settings-section">
                <h3 style="margin-bottom:16px;font-size:16px;letter-spacing:-0.01em;">Settings</h3>
                <div class="form-group">
                    <label class="form-label">GitHub Token</label>
                    <input type="password" class="form-input" id="tokenInput" placeholder="ghp_...">
                </div>
                <div class="form-group">
                    <label class="form-label">Agent Username</label>
                    <input class="form-input" id="usernameInput" placeholder="agent-of-yonib05" value="agent-of-yonib05">
                </div>
                <div class="form-group">
                    <label class="form-label">Exclude Repos (comma-separated owner/repo)</label>
                    <input class="form-input" id="excludeInput" placeholder="agent-of-yonib05/strands-coder-private">
                </div>
                <button class="save-btn" onclick="saveSettings()">Save & Load</button>
            </div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        let token = localStorage.getItem('activity_gh_token') || localStorage.getItem('gh_token') || '';
        let username = localStorage.getItem('activity_username') || 'agent-of-yonib05';
        let excludeRepos = (localStorage.getItem('activity_exclude') || '').split(',').filter(Boolean);
        
        let allPRs = [];
        let allIssues = [];
        let currentFilter = 'all';

        // Check URL params
        const params = new URLSearchParams(window.location.search);
        if (params.get('token')) { token = params.get('token'); localStorage.setItem('activity_gh_token', token); }
        if (params.get('user')) { username = params.get('user'); localStorage.setItem('activity_username', username); }

        document.addEventListener('DOMContentLoaded', function() {
            if (!token) {
                showSettings();
            } else {
                loadData();
            }
        });

        function showSettings() {
            document.getElementById('settingsPanel').style.display = 'block';
            document.getElementById('content').innerHTML = '';
            document.getElementById('tokenInput').value = token;
            document.getElementById('usernameInput').value = username;
            document.getElementById('excludeInput').value = excludeRepos.join(',');
        }

        window.saveSettings = function() {
            token = document.getElementById('tokenInput').value.trim();
            username = document.getElementById('usernameInput').value.trim();
            excludeRepos = document.getElementById('excludeInput').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
            
            localStorage.setItem('activity_gh_token', token);
            localStorage.setItem('activity_username', username);
            localStorage.setItem('activity_exclude', excludeRepos.join(','));
            
            document.getElementById('settingsPanel').style.display = 'none';
            loadData();
        };

        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelector('[data-filter="' + filter + '"]').classList.add('active');
            render();
        };

        window.loadData = async function() {
            if (!token || !username) {
                showSettings();
                return;
            }

            document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                var headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' };
                
                // Search for open PRs created by the agent in public repos
                var prQuery = 'is:pr is:open author:' + username + ' is:public';
                var prRes = await fetch('https://api.github.com/search/issues?q=' + encodeURIComponent(prQuery) + '&per_page=100&sort=updated&order=desc', { headers: headers });
                
                if (!prRes.ok) throw new Error('GitHub API error: ' + prRes.status);
                var prData = await prRes.json();
                
                // Search for open issues created by the agent in public repos
                var issueQuery = 'is:issue is:open author:' + username + ' is:public';
                var issueRes = await fetch('https://api.github.com/search/issues?q=' + encodeURIComponent(issueQuery) + '&per_page=100&sort=updated&order=desc', { headers: headers });
                
                if (!issueRes.ok) throw new Error('GitHub API error: ' + issueRes.status);
                var issueData = await issueRes.json();
                
                // Filter out excluded repos and agent's own repos
                var isExcluded = function(item) {
                    var repoUrl = item.repository_url || '';
                    var repoName = repoUrl.replace('https://api.github.com/repos/', '');
                    
                    // Exclude agent's own repos
                    if (repoName.startsWith(username + '/')) return true;
                    if (repoName.startsWith('yonib05/')) return true;
                    
                    // Exclude user's repos
                    for (var i = 0; i < excludeRepos.length; i++) {
                        if (repoName === excludeRepos[i] || repoName.startsWith(excludeRepos[i] + '/')) return true;
                    }
                    
                    return false;
                };
                
                allPRs = (prData.items || []).filter(function(item) { return !isExcluded(item); });
                allIssues = (issueData.items || []).filter(function(item) { return !isExcluded(item); });
                
                render();
                
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();
                
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">⚠</div><h3>Error loading data</h3><p>' + escapeHtml(e.message) + '</p><button class="refresh-btn" onclick="showSettings()" style="margin-top:16px;">Check Settings</button></div>';
                window.showSettings = showSettings;
            }
        };

        function render() {
            // Update overview numbers
            var repos = new Set();
            allPRs.concat(allIssues).forEach(function(item) {
                var repoUrl = item.repository_url || '';
                repos.add(repoUrl.replace('https://api.github.com/repos/', ''));
            });
            
            document.getElementById('totalPRs').textContent = allPRs.length;
            document.getElementById('totalIssues').textContent = allIssues.length;
            document.getElementById('totalRepos').textContent = repos.size;
            document.getElementById('totalItems').textContent = allPRs.length + allIssues.length;
            
            // Filter items
            var items = [];
            if (currentFilter === 'all') {
                items = allPRs.map(function(pr) { return Object.assign({}, pr, {_type: 'pr'}); }).concat(allIssues.map(function(issue) { return Object.assign({}, issue, {_type: 'issue'}); }));
            } else if (currentFilter === 'prs') {
                items = allPRs.map(function(pr) { return Object.assign({}, pr, {_type: 'pr'}); });
            } else {
                items = allIssues.map(function(issue) { return Object.assign({}, issue, {_type: 'issue'}); });
            }
            
            // Sort by updated_at descending
            items.sort(function(a, b) { return new Date(b.updated_at) - new Date(a.updated_at); });
            
            // Group by repo
            var byRepo = {};
            items.forEach(function(item) {
                var repoUrl = item.repository_url || '';
                var repoName = repoUrl.replace('https://api.github.com/repos/', '');
                if (!byRepo[repoName]) byRepo[repoName] = [];
                byRepo[repoName].push(item);
            });
            
            var content = document.getElementById('content');
            
            if (items.length === 0) {
                content.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><h3>No open items</h3><p>The agent has no open PRs or issues in public repos</p></div>';
                return;
            }
            
            var html = '';
            
            // Render grouped by repo
            var sortedRepos = Object.keys(byRepo).sort(function(a, b) { return byRepo[b].length - byRepo[a].length; });
            
            for (var r = 0; r < sortedRepos.length; r++) {
                var repoName = sortedRepos[r];
                var repoItems = byRepo[repoName];
                html += '<div class="section">';
                html += '<div class="section-header">';
                html += '<a href="https://github.com/' + repoName + '" target="_blank" style="color:inherit;text-decoration:none;">' + escapeHtml(repoName) + '</a>';
                html += ' <span class="section-count">' + repoItems.length + '</span>';
                html += '</div>';
                
                for (var i = 0; i < repoItems.length; i++) {
                    var item = repoItems[i];
                    var isPR = item._type === 'pr';
                    var isDraft = item.draft;
                    var labels = item.labels || [];
                    
                    html += '<a class="item-card" href="' + item.html_url + '" target="_blank">';
                    html += '<div class="item-top">';
                    html += '<div class="item-icon ' + (isPR ? 'pr' : 'issue') + '">' + (isPR ? 'PR' : '#') + '</div>';
                    html += '<div style="flex:1;min-width:0;">';
                    html += '<div class="item-title">#' + item.number + ' ' + escapeHtml(item.title) + '</div>';
                    html += '<div class="item-repo">' + escapeHtml(repoName) + '</div>';
                    html += '</div></div>';
                    html += '<div class="item-meta">';
                    html += '<span class="badge ' + (isDraft ? 'draft' : 'open') + '">' + (isDraft ? 'Draft' : 'Open') + '</span>';
                    html += '<span class="meta-text">Updated ' + formatDate(item.updated_at) + '</span>';
                    html += '<span class="meta-text">' + (item.comments || 0) + ' comments + '</span>';
                    for (var j = 0; j < labels.length; j++) {
                        var l = labels[j];
                        var bg = l.color ? '#' + l.color + '33' : 'rgba(255,255,255,0.08)';
                        var fg = l.color ? '#' + l.color : 'rgba(255,255,255,0.7)';
                        html += '<span class="label-badge" style="background:' + bg + '; color:' + fg + ';">' + escapeHtml(l.name) + '</span>';
                    }
                    html += '</div></a>';
                }
                
                html += '</div>';
            }
            
            content.innerHTML = html;
        }

        function formatDate(d) {
            if (!d) return '-';
            var diff = (Date.now() - new Date(d)) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return new Date(d).toLocaleDateString('en', { month: 'short', day: 'numeric' });
        }

        function escapeHtml(t) {
            if (!t) return '';
            var d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show';
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }
    })();
    </script>
</body>
</html>
